name: Build and deploy to GitHub Pages

# Builds the Pelican site and publishes it to GitHub Pages.
# Pages source must be set to "GitHub Actions" in the repo settings
# (Settings → Pages → Build and deployment → Source: GitHub Actions).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the site (production settings)
        run: pelican content -s publishconf.py -o output

      - name: Add custom domain and disable Jekyll
        run: |
          echo "campaigns.healthsites.io" > output/CNAME
          touch output/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

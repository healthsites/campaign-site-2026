{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ SITENAME }}{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>{{ page.title }}</h1>
    </div>
</section>

<section class="page-content">
    <div class="container">
        <article class="content">
            {{ page.content }}
        </article>
    </div>
</section>

{% endblock %}
